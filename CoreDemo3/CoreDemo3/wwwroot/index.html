<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">访客管理系统</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="index.html">访客登记</a>
                    <a class="nav-link" href="validate.html">通行码验证</a>
                    <a class="nav-link" href="records.html">记录查询</a>
                </div>
            </div>
        </nav>

        <!-- 主要内容 -->
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">
                                <i class="bi bi-person-plus"></i>
                                访客信息登记
                            </h4>
                        </div>
                        <div class="card-body">
                            <form id="visitorForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="name" class="form-label">姓名 <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="name" name="name" required maxlength="50">
                                        <div class="invalid-feedback">请输入姓名（最多50个字符）</div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="phone" class="form-label">手机号 <span class="text-danger">*</span></label>
                                        <input type="tel" class="form-control" id="phone" name="phone" required
                                               pattern="^1[3-9]\d{9}$" placeholder="请输入11位手机号">
                                        <div class="invalid-feedback">请输入正确的手机号格式</div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="idCard" class="form-label">身份证号 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="idCard" name="idCard" required
                                           pattern="^[1-9]\d{5}(18|19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dXx]$"
                                           placeholder="请输入18位身份证号">
                                    <div class="invalid-feedback">请输入正确的身份证号格式</div>
                                </div>

                                <div class="mb-3">
                                    <label for="visitedPerson" class="form-label">被访人 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="visitedPerson" name="visitedPerson" required maxlength="50">
                                    <div class="invalid-feedback">请输入被访人姓名（最多50个字符）</div>
                                </div>

                                <div class="mb-3">
                                    <label for="visitReason" class="form-label">来访事由 <span class="text-danger">*</span></label>
                                    <textarea class="form-control" id="visitReason" name="visitReason" rows="3" required maxlength="200"></textarea>
                                    <div class="invalid-feedback">请输入来访事由（最多200个字符）</div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                        提交登记
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 成功提示模态框 -->
            <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header bg-success text-white">
                            <h5 class="modal-title">
                                <i class="bi bi-check-circle"></i>
                                登记成功
                            </h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="text-center mb-3">
                                <h2 class="text-primary" id="accessCodeDisplay">------</h2>
                                <p class="text-muted">您的通行码</p>
                            </div>
                            <div class="alert alert-info">
                                <strong>访客信息：</strong><br>
                                姓名：<span id="visitorName"></span><br>
                                手机：<span id="visitorPhone"></span><br>
                                被访人：<span id="visitorVisitedPerson"></span><br>
                                有效期：<span id="visitorExpiryTime"></span>
                            </div>
                            <div class="alert alert-warning">
                                <i class="bi bi-exclamation-triangle"></i>
                                请妥善保管通行码，凭此码可通过门禁系统
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                            <button type="button" class="btn btn-primary" onclick="printAccessCode()">打印通行码</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 错误提示模态框 -->
            <div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header bg-danger text-white">
                            <h5 class="modal-title">
                                <i class="bi bi-x-circle"></i>
                                登记失败
                            </h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="alert alert-danger" id="errorMessage">
                                登记失败，请稍后重试
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"></script>
    <script src="js/register.js"></script>
</body>
</html>
