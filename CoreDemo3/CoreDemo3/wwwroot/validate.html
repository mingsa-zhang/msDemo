<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通行码验证 - 访客管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">访客管理系统</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">访客登记</a>
                    <a class="nav-link active" href="validate.html">通行码验证</a>
                    <a class="nav-link" href="records.html">记录查询</a>
                </div>
            </div>
        </nav>

        <!-- 主要内容 -->
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header bg-success text-white">
                            <h4 class="mb-0">
                                <i class="bi bi-shield-check"></i>
                                通行码验证
                            </h4>
                        </div>
                        <div class="card-body">
                            <form id="validateForm">
                                <div class="mb-4">
                                    <label for="accessCode" class="form-label">
                                        请输入6位数字通行码
                                    </label>
                                    <input type="text"
                                           class="form-control form-control-lg text-center code-input"
                                           id="accessCode"
                                           name="accessCode"
                                           required
                                           maxlength="6"
                                           pattern="^\d{6}$"
                                           placeholder="------"
                                           autocomplete="off">
                                    <div class="invalid-feedback">
                                        请输入6位数字通行码
                                    </div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success btn-lg" id="validateBtn">
                                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                        <i class="bi bi-check-circle"></i>
                                        验证通行码
                                    </button>
                                </div>
                            </form>

                            <!-- 验证结果显示区域 -->
                            <div id="resultArea" class="mt-4" style="display: none;">
                                <div id="resultContent"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 最近验证记录 -->
            <div class="row mt-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-clock-history"></i>
                                最近验证记录
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="recentValidations">
                                <p class="text-muted text-center">暂无验证记录</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/validate.js"></script>
</body>
</html>
