<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录查询 - 访客管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">访客管理系统</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">访客登记</a>
                    <a class="nav-link" href="validate.html">通行码验证</a>
                    <a class="nav-link active" href="records.html">记录查询</a>
                </div>
            </div>
        </nav>

        <!-- 主要内容 -->
        <div class="container mt-4">
            <!-- 统计卡片 -->
            <div class="row mb-4">
                <div class="col-md-3 col-sm-6 mb-3">
                    <div class="stats-card">
                        <h3 id="totalCount">0</h3>
                        <p>今日总计</p>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6 mb-3">
                    <div class="stats-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <h3 id="registeredCount">0</h3>
                        <p>已登记</p>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6 mb-3">
                    <div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <h3 id="checkedInCount">0</h3>
                        <p>已入场</p>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6 mb-3">
                    <div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <h3 id="checkedOutCount">0</h3>
                        <p>已离场</p>
                    </div>
                </div>
            </div>

            <!-- 查询条件 -->
            <div class="card mb-4">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-search"></i>
                        查询条件
                    </h5>
                </div>
                <div class="card-body">
                    <form id="searchForm">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="startDate" class="form-label">开始时间</label>
                                <input type="datetime-local" class="form-control" id="startDate" name="startDate">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="endDate" class="form-label">结束时间</label>
                                <input type="datetime-local" class="form-control" id="endDate" name="endDate">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="searchInput" class="form-label">搜索关键词</label>
                                <div class="search-box">
                                    <i class="bi bi-search search-icon"></i>
                                    <input type="text" class="form-control" id="searchInput" placeholder="姓名、手机号、身份证号...">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary" id="searchBtn">
                                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                    <i class="bi bi-search"></i>
                                    查询
                                </button>
                                <button type="button" class="btn btn-secondary ms-2" id="resetBtn">
                                    <i class="bi bi-arrow-clockwise"></i>
                                    重置
                                </button>
                                <button type="button" class="btn btn-success ms-2" id="exportBtn">
                                    <i class="bi bi-download"></i>
                                    导出Excel
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 查询结果 -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center bg-light">
                    <h5 class="mb-0">
                        <i class="bi bi-table"></i>
                        查询结果
                        <small class="text-muted">（共 <span id="recordCount">0</span> 条记录）</small>
                    </h5>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-secondary" id="refreshBtn">
                            <i class="bi bi-arrow-clockwise"></i>
                            刷新
                        </button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>访客姓名</th>
                                    <th>手机号</th>
                                    <th>身份证号</th>
                                    <th>被访人</th>
                                    <th>来访事由</th>
                                    <th>通行码</th>
                                    <th>状态</th>
                                    <th>登记时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTableBody">
                                <tr>
                                    <td colspan="9" class="text-center text-muted py-4">
                                        <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                                        <p class="mb-0 mt-2">暂无数据，请设置查询条件后查询</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 访客详情模态框 -->
    <div class="modal fade" id="visitorDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-person-lines-fill"></i>
                        访客详细信息
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="visitorDetailContent">
                    <!-- 详情内容将通过JavaScript动态填充 -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/records.js"></script>
</body>
</html>
